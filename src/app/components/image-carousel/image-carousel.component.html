<div #carousel id="carosel" class="relative w-full">
    <!-- Carousel wrapper -->
    <div class="relative overflow-hidden h-96 px-0 rounded-md">
        @for (image of images; track $index) {
            <div #carouselItem class="hidden duration-700 ease-in-out">
                <img src="{{imagePath+image}}" class="absolute block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2" alt="...">
            </div>
        }
    </div>
    <!-- Slider indicators -->
    <div class="absolute z-30 flex -translate-x-1/2 bottom-5 left-1/2 space-x-3">
        @for (image of images; track $index) {
            <button #carouselIndicator type="button" class="w-3 h-3 rounded-full" aria-current="true" [attr.aria-label]="'Slide '+($index+1)"></button>
        }
        @if (cycling === true) {
            <button type="button" (click)="dataPause()" class="!ml-2 flex items-center justify-center">
                <fa-icon [icon]="faPause" class="text-md text-slate-200 flex items-center justify-center w-3 h-3"></fa-icon>
            </button>
        } @else if (cycling === false) {
            <button type="button" (click)="dataCycle()" class="!ml-2 flex items-center justify-center">
                <fa-icon [icon]="faCaretRight" class="text-md text-slate-200 flex items-center justify-center w-3 h-3"></fa-icon>
            </button>
        }
    </div>
    <!-- Slider controls -->
    <button type="button" (click)="dataPrev()" class="absolute top-0 start-5 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none">
        <fa-icon [icon]="faCaretLeft" class="text-3xl text-slate-200 w-10 h-10 flex items-center justify-center rounded-full bg-slate-500 hover:bg-slate-600"></fa-icon>
    </button>
    <button type="button" (click)="dataNext()" class="absolute top-0 end-5 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none">
        <fa-icon [icon]="faCaretRight" class="text-3xl text-slate-200 w-10 h-10 flex items-center justify-center rounded-full bg-slate-500 hover:bg-slate-600"></fa-icon>
    </button>
</div>
